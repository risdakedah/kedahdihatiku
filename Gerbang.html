<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://script.google.com https://script.googleusercontent.com;
    style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com;
    font-src https://fonts.gstatic.com https://cdnjs.cloudflare.com;
    img-src 'self' https://i.ibb.co data:;
    connect-src 'self' https://script.google.com https://script.googleusercontent.com;
  ">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
  <meta name="robots" content="noindex, nofollow">
  <title>SiDiK — Sistem Data Induk Kedah</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    :root {
      --risda-green : #006837;
      --risda-dark  : #003b1f;
      --risda-gold  : #c6a355;
      --neon        : #00e87a;
      --bg-deep     : #020d07;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: radial-gradient(ellipse at 50% 30%, #0a2115 0%, var(--bg-deep) 70%);
      font-family: 'Rajdhani', sans-serif;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ── Grid latarbelakang ── */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(0,232,122,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,232,122,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    /* Partikel cahaya atas bawah */
    .bg-glow {
      position: fixed;
      width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(0,104,55,0.12) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
      top: -200px; left: 50%; transform: translateX(-50%);
    }

    /* ── KAD LOG MASUK ── */
    .gerbang-wrapper {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 24px; position: relative; z-index: 1;
    }

    .kad-gerbang {
      background: rgba(0,20,10,0.72);
      border: 1px solid rgba(198,163,85,0.28);
      border-radius: 22px;
      padding: 52px 44px 44px;
      width: 100%; max-width: 440px;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 60px rgba(0,104,55,0.25), inset 0 1px 0 rgba(255,255,255,0.04);
      position: relative;
    }

    /* Rim emas atas */
    .kad-gerbang::before {
      content: '';
      position: absolute; top: 0; left: 20%; right: 20%; height: 2px;
      background: linear-gradient(90deg, transparent, var(--risda-gold), transparent);
      border-radius: 2px;
    }

    /* Logo RISDA dengan animasi 3D */
    .logo-risda {
      width: 90px; margin: 0 auto 22px;
      display: block;
      animation: putarY3D 7s linear infinite;
      filter: drop-shadow(0 0 12px rgba(198,163,85,0.4));
    }
    @keyframes putarY3D {
      from { transform: rotateY(0deg); }
      to   { transform: rotateY(360deg); }
    }

    .tajuk-sistem {
      font-family: 'Orbitron', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--neon);
      letter-spacing: 3px;
      line-height: 1.15;
      text-align: center;
      text-shadow: 0 0 20px rgba(0,232,122,0.35);
      margin-bottom: 4px;
    }
    .tajuk-sistem span { color: var(--risda-gold); }

    .subtajuk {
      text-align: center;
      color: rgba(198,163,85,0.75);
      font-size: 0.95rem;
      letter-spacing: 1.5px;
      margin-bottom: 36px;
    }

    /* Amaran cubaan */
    .amaran-cubaan {
      min-height: 22px; margin-bottom: 14px;
      font-size: 0.82rem; color: #ff9944;
      text-align: center; letter-spacing: 0.5px;
      transition: opacity 0.3s;
    }

    /* Input emel */
    .kump-input { position: relative; margin-bottom: 16px; }
    .kump-input i {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--neon); font-size: 0.9rem; pointer-events: none;
    }
    .input-emel {
      width: 100%;
      padding: 13px 16px 13px 42px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(0,232,122,0.2);
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      font-family: 'Rajdhani', sans-serif;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .input-emel:focus {
      border-color: var(--neon);
      box-shadow: 0 0 16px rgba(0,232,122,0.2);
    }
    .input-emel::placeholder { color: rgba(255,255,255,0.28); }

    /* Butang masuk */
    .btn-masuk {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--risda-green), #009955);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      position: relative;
      overflow: hidden;
    }
    .btn-masuk::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, transparent 60%, rgba(255,255,255,0.08));
    }
    .btn-masuk:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0,232,122,0.3);
    }
    .btn-masuk:active:not(:disabled) { transform: translateY(0); }
    .btn-masuk:disabled {
      opacity: 0.45; cursor: not-allowed; transform: none;
    }

    /* ── PENUTUP KUNCI ── */
    .penutup-kunci {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(2,13,7,0.97);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
    }
    .kunci-tajuk {
      font-family: 'Orbitron', sans-serif;
      color: #dc3545; font-size: 1.35rem; text-align: center;
    }
    .kunci-masa {
      font-family: 'Orbitron', sans-serif;
      font-size: 3.5rem; color: var(--risda-gold);
      text-shadow: 0 0 20px rgba(198,163,85,0.5);
    }
    .kunci-nota { color: #888; max-width: 360px; text-align: center; line-height: 1.6; font-size: 0.9rem; }

    /* ── PANEL KEJAYAAN ── */
    #panel-berjaya {
      display: none; text-align: center;
    }
    .ikon-berjaya {
      font-size: 3rem; color: var(--neon);
      margin-bottom: 16px;
      animation: nadi 1s ease-in-out infinite;
    }
    @keyframes nadi {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.08); }
    }
    .teks-berjaya {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.1rem; color: var(--neon);
      letter-spacing: 1.5px; margin-bottom: 8px;
    }
    .teks-redirect { color: #888; font-size: 0.85rem; }

    /* Footer */
    footer {
      text-align: center; padding: 14px;
      font-size: 0.78rem; color: #333;
      position: relative; z-index: 1;
    }

    @media (max-width: 480px) {
      .kad-gerbang { padding: 40px 24px 32px; }
      .tajuk-sistem { font-size: 1.55rem; }
    }
  </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<!-- ════════════════════════════════
     BORANG LOG MASUK
════════════════════════════════ -->
<div class="gerbang-wrapper">
  <div class="kad-gerbang">

    <!-- Logo -->
    <img src="https://i.ibb.co/3yrQJvX0/logo-risda-gold-emboss-removebg-preview.png"
         alt="Logo RISDA Kedah" class="logo-risda" draggable="false">

    <!-- Tajuk -->
    <div class="tajuk-sistem">SiDiK</div>
    <div class="subtajuk">SISTEM DATA INDUK KEDAH</div>

    <!-- Panel utama (log masuk) -->
    <div id="panel-login">
      <div class="amaran-cubaan" id="amaranCubaan" role="alert" aria-live="polite"></div>

      <form id="borangLogin" autocomplete="off" novalidate>
        <div class="kump-input">
          <i class="fas fa-envelope" aria-hidden="true"></i>
          <input type="email"
                 id="inputEmel"
                 class="input-emel"
                 placeholder="emel@risda.gov.my"
                 autocomplete="email"
                 spellcheck="false"
                 maxlength="100"
                 required
                 aria-label="Masukkan alamat emel RISDA anda">
        </div>
        <button type="submit" class="btn-masuk" id="btnMasuk">
          <i class="fas fa-shield-halved me-2" aria-hidden="true"></i>Masuk SiDiK
        </button>
      </form>
    </div>

    <!-- Panel kejayaan -->
    <div id="panel-berjaya">
      <div class="ikon-berjaya"><i class="fas fa-circle-check"></i></div>
      <div class="teks-berjaya">AKSES DISAHKAN</div>
      <div id="namaPengguna" class="text-warning fw-bold mb-2" style="font-size:1.05rem;"></div>
      <div class="teks-redirect">
        <i class="fas fa-spinner fa-spin me-1"></i>Memuatkan SiDiK...
      </div>
    </div>

  </div>
</div>

<footer>HAK CIPTA TERPELIHARA &copy; 2026 | INOVASI PENGURUSAN RISDA KEDAH</footer>

<script>
'use strict';

/* ════════════════════════════════════════════════════════════════════
   KONFIGURASI — Uncle Noa: tukar URL mengikut deployment terkini
════════════════════════════════════════════════════════════════════ */
const CFG = Object.freeze({
  // URL Web App GAS SiDiK (sama fungsi sebagai authenticator + app)
  GAS_URL : 'https://script.google.com/macros/s/AKfycbzHNXz-kDnSS0LHn9VQmOckeHfC58oXBomikv01zuTm0EgrB9ye0z82hxm7LNjR4CJVqw/exec',

  DOMAIN          : '@risda.gov.my',
  MAX_CUBAAN      : 5,
  MINIT_KUNCI     : 15,
  MINIT_SESI      : 120,
  KUNCI_SESI      : 'sidik_sess_v1',
  KUNCI_KUNCI     : 'sidik_lock_v1',
});

/* ════════════════════════════════════════════════════════════════════
   PEMBOLEHUBAH KEADAAN
════════════════════════════════════════════════════════════════════ */
let bilanganCubaan = 0;
let timerSesi      = null;

/* ════════════════════════════════════════════════════════════════════
   PENGURUSAN KUNCI (Lockout)
════════════════════════════════════════════════════════════════════ */
function bacaKunci() {
  try {
    const raw = sessionStorage.getItem(CFG.KUNCI_KUNCI);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (Date.now() > obj.sehingga) {
      sessionStorage.removeItem(CFG.KUNCI_KUNCI);
      return null;
    }
    return obj;
  } catch { return null; }
}

function tetapKunci() {
  const sehingga = Date.now() + CFG.MINIT_KUNCI * 60_000;
  sessionStorage.setItem(CFG.KUNCI_KUNCI, JSON.stringify({ sehingga }));
  paparPenutupKunci(sehingga);
}

function paparPenutupKunci(sehingga) {
  // Buang penutup lama jika ada
  document.getElementById('penutupKunci')?.remove();

  const el = document.createElement('div');
  el.className = 'penutup-kunci';
  el.id = 'penutupKunci';
  el.setAttribute('role', 'alert');
  el.innerHTML = `
    <i class="fas fa-shield-xmark" style="font-size:3.5rem;color:#dc3545;"></i>
    <div class="kunci-tajuk">⛔ AKSES DIKUNCI SEMENTARA</div>
    <div class="kunci-masa" id="masaKunci" aria-live="polite">--:--</div>
    <p class="kunci-nota">Terlalu banyak cubaan akses gagal. Portal dikunci bagi
    melindungi keselamatan data RISDA Kedah.</p>
    <p class="kunci-nota" style="font-size:0.8rem;color:#555;">
      Hubungi pentadbir ICT jika memerlukan bantuan segera.</p>
  `;
  document.body.appendChild(el);
  kiraKiriKunci(sehingga, el);
}

function kiraKiriKunci(sehingga, penutup) {
  const tick = () => {
    const baki = Math.max(0, sehingga - Date.now());
    const m    = String(Math.floor(baki / 60_000)).padStart(2, '0');
    const s    = String(Math.floor((baki % 60_000) / 1000)).padStart(2, '0');
    const el   = document.getElementById('masaKunci');
    if (el) el.textContent = `${m}:${s}`;
    if (baki <= 0) {
      penutup.remove();
      sessionStorage.removeItem(CFG.KUNCI_KUNCI);
      bilanganCubaan = 0;
      kemasKiniAmaran();
    } else { setTimeout(tick, 1000); }
  };
  tick();
}

function kemasKiniAmaran() {
  const el = document.getElementById('amaranCubaan');
  if (!el) return;
  const baki = CFG.MAX_CUBAAN - bilanganCubaan;
  el.textContent = bilanganCubaan > 0
    ? `⚠ ${baki} cubaan lagi sebelum portal dikunci (${CFG.MINIT_KUNCI} min)`
    : '';
}

/* ════════════════════════════════════════════════════════════════════
   PENGESAHAN FORMAT EMEL (client-side pre-check)
════════════════════════════════════════════════════════════════════ */
function sahFormatEmel(emel) {
  if (!emel || typeof emel !== 'string' || emel.length > 100) return false;
  return /^[a-z0-9][a-z0-9._-]{0,62}@risda\.gov\.my$/i.test(emel);
}

/* ════════════════════════════════════════════════════════════════════
   SHA-256 HASH (emel tidak dihantar secara terus)
════════════════════════════════════════════════════════════════════ */
async function hashEmel(emel) {
  const encoded = new TextEncoder().encode(emel.toLowerCase().trim());
  const buf     = await crypto.subtle.digest('SHA-256', encoded);
  return Array.from(new Uint8Array(buf))
    .map(b => b.toString(16).padStart(2, '0')).join('');
}

/* ════════════════════════════════════════════════════════════════════
   JSONP — panggil GAS tanpa CORS (serasi GitHub Pages → GAS)
════════════════════════════════════════════════════════════════════ */
function panggilGAS(token) {
  return new Promise((ok, gagal) => {
    const cbNama = '_sidikCb_' + Date.now();
    const skrip  = document.createElement('script');
    const timer  = setTimeout(() => {
      bersih();
      gagal(new Error('Timeout — GAS tidak menjawab dalam 15 saat'));
    }, 15_000);

    function bersih() {
      clearTimeout(timer);
      delete window[cbNama];
      skrip.parentNode?.removeChild(skrip);
    }

    window[cbNama] = function(data) { bersih(); ok(data); };

    skrip.src = CFG.GAS_URL
      + '?action=authenticate'
      + '&token=' + encodeURIComponent(token)
      + '&callback=' + cbNama
      + '&_=' + Date.now();
    skrip.onerror = () => { bersih(); gagal(new Error('Skrip GAS gagal')); };
    document.head.appendChild(skrip);
  });
}

/* ════════════════════════════════════════════════════════════════════
   PROSES LOG MASUK
════════════════════════════════════════════════════════════════════ */
async function prosesLogMasuk(e) {
  e.preventDefault();

  // Semak kunci aktif
  const kunci = bacaKunci();
  if (kunci) { paparPenutupKunci(kunci.sehingga); return; }

  const emel   = document.getElementById('inputEmel').value.toLowerCase().trim();
  const btnEl  = document.getElementById('btnMasuk');

  if (!sahFormatEmel(emel)) {
    Swal.fire({
      icon: 'warning', title: 'Format Emel Tidak Sah',
      text: `Sila masukkan emel rasmi anda (contoh: nama@risda.gov.my)`,
      background: '#020d07', color: '#fff', confirmButtonColor: '#006837'
    });
    return;
  }

  bilanganCubaan++;
  btnEl.disabled = true;
  btnEl.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Mengesahkan...';

  Swal.fire({
    title: 'MENGESAHKAN IDENTITI',
    html: 'Sistem sedang menyemak kelayakan akses anda...',
    background: '#020d07', color: '#fff',
    allowOutsideClick: false, showConfirmButton: false,
    didOpen: () => Swal.showLoading()
  });

  try {
    const token = await hashEmel(emel);
    const data  = await panggilGAS(token);

    if (data && data.status === 'OK' && data.authorised === true) {
      bilanganCubaan = 0;
      simpanSesi(emel, data.nama, data.peranan, data.ptj);
      Swal.close();
      paparKejayaan(data.nama || emel.split('@')[0], emel);
    } else {
      Swal.close();
      tanganiGagal();
    }

  } catch (err) {
    console.warn('[SiDiK Gerbang] Ralat auth:', err.message);
    Swal.close();
    Swal.fire({
      icon: 'error', title: 'Ralat Sambungan',
      text: 'Tidak dapat menghubungi pelayan. Sila cuba sebentar lagi.',
      background: '#020d07', color: '#fff', confirmButtonColor: '#006837'
    });
    resetButang();
  }
}

function tanganiGagal() {
  if (bilanganCubaan >= CFG.MAX_CUBAAN) { tetapKunci(); return; }
  kemasKiniAmaran();
  resetButang();
  Swal.fire({
    icon: 'error', title: '⛔ AKSES DISEKAT',
    text: 'Emel anda tidak mempunyai kebenaran untuk mengakses SiDiK.',
    background: '#020d07', color: '#fff', confirmButtonColor: '#dc3545'
  });
}

function resetButang() {
  const btn = document.getElementById('btnMasuk');
  if (btn) {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-shield-halved me-2"></i>Masuk SiDiK';
  }
}

/* ════════════════════════════════════════════════════════════════════
   PAPARAN KEJAYAAN & REDIRECT
════════════════════════════════════════════════════════════════════ */
function paparKejayaan(nama, emel) {
  mainkanBunyi();
  document.getElementById('panel-login').style.display  = 'none';
  document.getElementById('panel-berjaya').style.display = 'block';
  document.getElementById('namaPengguna').textContent    = nama;

  // Redirect ke SiDiK selepas 2 saat
  setTimeout(() => {
    window.location.href = CFG.GAS_URL;
  }, 2000);
}

/* ════════════════════════════════════════════════════════════════════
   PENGURUSAN SESI (sessionStorage — padam bila tab ditutup)
════════════════════════════════════════════════════════════════════ */
function simpanSesi(emel, nama, peranan, ptj) {
  const data = {
    emel, nama, peranan, ptj,
    tamat: Date.now() + CFG.MINIT_SESI * 60_000
  };
  sessionStorage.setItem(CFG.KUNCI_SESI, btoa(JSON.stringify(data)));
}

function bacaSesi() {
  try {
    const raw  = sessionStorage.getItem(CFG.KUNCI_SESI);
    if (!raw) return null;
    const sesi = JSON.parse(atob(raw));
    if (!sesi?.tamat || Date.now() > sesi.tamat) {
      sessionStorage.removeItem(CFG.KUNCI_SESI);
      return null;
    }
    return sesi;
  } catch { return null; }
}

/* ════════════════════════════════════════════════════════════════════
   BUNYI BERJAYA
════════════════════════════════════════════════════════════════════ */
function mainkanBunyi() {
  try {
    const ctx  = new (window.AudioContext || window.webkitAudioContext)();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(500, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1100, ctx.currentTime + 0.25);
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + 0.08);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.45);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.45);
  } catch { /* AudioContext tidak tersedia */ }
}

/* ════════════════════════════════════════════════════════════════════
   EVENT LISTENERS
════════════════════════════════════════════════════════════════════ */
document.getElementById('borangLogin').addEventListener('submit', prosesLogMasuk);

window.addEventListener('DOMContentLoaded', () => {
  // Semak sesi aktif — jika masih sah, redirect terus
  const sesi = bacaSesi();
  if (sesi && sesi.tamat > Date.now()) {
    paparKejayaan(sesi.nama || sesi.emel.split('@')[0], sesi.emel);
    return;
  }

  // Semak kunci aktif
  const kunci = bacaKunci();
  if (kunci) paparPenutupKunci(kunci.sehingga);
});

/* Console amaran keselamatan */
console.log('%c⛔ AMARAN KESELAMATAN!',
  'color:#dc3545;font-size:32px;font-weight:bold;');
console.log('%cPortal SiDiK dipantau. Sebarang percubaan manipulasi sesi adalah kesalahan.',
  'color:#c6a355;font-size:13px;font-family:monospace;');
</script>
</body>
</html>
